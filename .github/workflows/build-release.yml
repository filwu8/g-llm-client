name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft --generate-notes --title "$GITHUB_REF_NAME"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64 + arm64
            os: macos-latest
            package_script: package:mac
            release_files: dist/*.dmg
          - name: Windows x64
            os: windows-latest
            package_script: package:win
            release_files: dist/*.exe
          - name: Linux x64
            os: ubuntu-latest
            package_script: package:linux
            release_files: |
              dist/*.AppImage
              dist/*.deb

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package app
        run: pnpm ${{ matrix.package_script }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify Windows signatures
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            Write-Host "WIN_CSC_LINK is not configured; Windows artifacts will be unsigned."
            exit 0
          }

          $targets = @(
            "dist\G-LLM-Setup-*.exe",
            "dist\win-unpacked\G-LLM.exe"
          )

          $files = foreach ($target in $targets) {
            Get-ChildItem -Path $target -ErrorAction SilentlyContinue
          }

          if (-not $files) {
            throw "No Windows executable artifacts were found for signature verification."
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid or missing signature: $($file.FullName)"
            }
          }

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: ${{ matrix.release_files }}

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=${{ contains(github.ref_name, '-') }}
