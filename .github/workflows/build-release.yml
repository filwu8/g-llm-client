name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64 + arm64
            os: macos-latest
            artifact_name: g-llm-macos
            package_script: package:mac
          - name: Windows x64
            os: windows-latest
            artifact_name: g-llm-windows
            package_script: package:win
          - name: Linux x64
            os: ubuntu-latest
            artifact_name: g-llm-linux
            package_script: package:linux

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package app
        run: pnpm ${{ matrix.package_script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.msi
            dist/*.pkg
            dist/*.rpm
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show release files
        run: find release-artifacts -maxdepth 3 -type f -print | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.pkg
            release-artifacts/**/*.rpm
            release-artifacts/**/*.zip
            release-artifacts/**/*.blockmap
            release-artifacts/**/latest*.yml
