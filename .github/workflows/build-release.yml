name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      release_tag:
        description: Existing release tag to build, for example v1.2.1
        required: true
        type: string
      publish_release:
        description: Replace matching assets in the GitHub Release
        required: true
        default: true
        type: boolean

concurrency:
  group: build-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      checkout_ref: ${{ steps.config.outputs.checkout_ref }}
      matrix: ${{ steps.config.outputs.matrix }}
      release_mode: ${{ steps.config.outputs.release_mode }}
      release_tag: ${{ steps.config.outputs.release_tag }}
      upload_release: ${{ steps.config.outputs.upload_release }}

    steps:
      - name: Resolve build configuration
        id: config
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLATFORM: ${{ inputs.platform }}
          INPUT_PUBLISH_RELEASE: ${{ inputs.publish_release }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          platform="${INPUT_PLATFORM:-all}"
          checkout_ref="$GITHUB_SHA"
          release_mode="none"
          release_tag=""
          upload_release="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            release_tag="$INPUT_RELEASE_TAG"
            checkout_ref="$release_tag"

            if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag: $release_tag" >&2
              exit 1
            fi

            if [[ "$INPUT_PUBLISH_RELEASE" == "true" ]]; then
              release_mode="manual"
              upload_release="true"
            fi
          elif [[ "$REF_TYPE" == "tag" ]]; then
            platform="all"
            checkout_ref="$GITHUB_SHA"
            release_mode="tag"
            release_tag="$REF_NAME"
            upload_release="true"
          fi

          case "$platform" in
            windows)
              matrix='{"include":[{"id":"windows","name":"Windows x64","os":"windows-latest","package_script":"package:win","release_files":"dist/*.exe"}]}'
              ;;
            macos)
              matrix='{"include":[{"id":"macos","name":"macOS x64 + arm64","os":"macos-latest","package_script":"package:mac","release_files":"dist/*.dmg"}]}'
              ;;
            linux)
              matrix='{"include":[{"id":"linux","name":"Linux x64","os":"ubuntu-latest","package_script":"package:linux","release_files":"dist/*.AppImage\ndist/*.deb"}]}'
              ;;
            all)
              matrix='{"include":[{"id":"macos","name":"macOS x64 + arm64","os":"macos-latest","package_script":"package:mac","release_files":"dist/*.dmg"},{"id":"windows","name":"Windows x64","os":"windows-latest","package_script":"package:win","release_files":"dist/*.exe"},{"id":"linux","name":"Linux x64","os":"ubuntu-latest","package_script":"package:linux","release_files":"dist/*.AppImage\ndist/*.deb"}]}'
              ;;
            *)
              echo "Unsupported platform: $platform" >&2
              exit 1
              ;;
          esac

          {
            echo "checkout_ref=$checkout_ref"
            echo "matrix=$matrix"
            echo "release_mode=$release_mode"
            echo "release_tag=$release_tag"
            echo "upload_release=$upload_release"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        if: steps.config.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.config.outputs.release_tag }}
        run: gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null

      - name: Create release when needed
        if: steps.config.outputs.upload_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_MODE: ${{ steps.config.outputs.release_mode }}
          RELEASE_TAG: ${{ steps.config.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          args=("$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --generate-notes --title "$RELEASE_TAG")
          if [[ "$RELEASE_MODE" == "tag" ]]; then
            args+=(--draft)
          fi
          gh release create "${args[@]}"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-release.outputs.matrix) }}

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Verify release version
        if: needs.prepare-release.outputs.release_tag != ''
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          expected_version="${RELEASE_TAG#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$package_version" != "$expected_version" ]]; then
            echo "package.json version $package_version does not match $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package app
        run: pnpm ${{ matrix.package_script }}
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify Windows package
        if: matrix.id == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installerPath = Join-Path $PWD "dist\G-LLM-Setup-$version-x64.exe"
          $appPath = Join-Path $PWD "dist\win-unpacked\G-LLM.exe"

          function Read-PeMachine([string]$path) {
            $reader = [System.IO.BinaryReader]::new([System.IO.File]::OpenRead($path))
            try {
              if ($reader.ReadUInt16() -ne 0x5A4D) {
                throw "$path does not have a valid MZ header."
              }
              $reader.BaseStream.Position = 0x3C
              $peOffset = $reader.ReadInt32()
              $reader.BaseStream.Position = $peOffset
              if ($reader.ReadUInt32() -ne 0x00004550) {
                throw "$path does not have a valid PE header."
              }
              return $reader.ReadUInt16()
            } finally {
              $reader.Dispose()
            }
          }

          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "Expected installer was not created: $installerPath"
          }
          if (-not (Test-Path -LiteralPath $appPath)) {
            throw "Expected unpacked application was not created: $appPath"
          }

          $installer = Get-Item -LiteralPath $installerPath
          if ($installer.Length -lt 50MB) {
            throw "Windows installer is unexpectedly small: $($installer.Length) bytes"
          }

          $installerMachine = Read-PeMachine $installerPath
          $appMachine = Read-PeMachine $appPath
          if ($appMachine -ne 0x8664) {
            throw "G-LLM.exe is not x64. PE machine: 0x$($appMachine.ToString('X4'))"
          }

          $hash = (Get-FileHash -LiteralPath $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "### Windows x64 package"
            ""
            "- Installer: ``$($installer.Name)``"
            "- Size: $($installer.Length) bytes"
            "- Installer PE machine: ``0x$($installerMachine.ToString('X4'))``"
            "- Application PE machine: ``0x$($appMachine.ToString('X4'))``"
            "- SHA-256: ``$hash``"
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Verify Windows signatures
        if: matrix.id == 'windows'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK)) {
            Write-Host "WIN_CSC_LINK is not configured; Windows artifacts will be unsigned."
            exit 0
          }

          $targets = @(
            "dist\G-LLM-Setup-*.exe",
            "dist\win-unpacked\G-LLM.exe"
          )

          $files = foreach ($target in $targets) {
            Get-ChildItem -Path $target -ErrorAction SilentlyContinue
          }

          if (-not $files) {
            throw "No Windows executable artifacts were found for signature verification."
          }

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            Write-Host "$($file.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              throw "Invalid or missing signature: $($file.FullName)"
            }
          }

      - name: Upload release assets
        if: needs.prepare-release.outputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          draft: ${{ needs.prepare-release.outputs.release_mode == 'tag' }}
          prerelease: ${{ contains(needs.prepare-release.outputs.release_tag, '-') }}
          fail_on_unmatched_files: true
          files: ${{ matrix.release_files }}

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare-release
      - build
    if: needs.prepare-release.outputs.release_mode == 'tag'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease=${{ contains(needs.prepare-release.outputs.release_tag, '-') }}
